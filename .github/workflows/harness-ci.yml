name: Harness Self-Test

on:
  push:
    paths:
      - '.clinerules/**'
      - 'tests/**'
      - 'deploy.ps1'
      - 'verify-harness.ps1'
  pull_request:
    paths:
      - '.clinerules/**'
      - 'tests/**'
      - 'deploy.ps1'
      - 'verify-harness.ps1'

jobs:
  verify:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run verify-harness.ps1
        run: |
          powershell -NoProfile -ExecutionPolicy Bypass -File .\verify-harness.ps1
        shell: pwsh